<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Services - LuxuryStay</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="nav">
                <a href="index.html" class="logo">LuxuryStay</a>
                <nav class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="properties.html">Properties</a>
                    <a href="chefs.html">Chefs</a>
                    <a href="transport.html">Transport</a>
                    <a href="photography.html" class="highlight">Photography</a>
                    <a href="attractions.html">Attractions</a>
                    <a href="build-trip.html">Build My Trip</a>
                </nav>
                <a href="cart.html" style="position: relative; margin-left: auto; text-decoration: none;">
                    <span style="font-size: 1.5rem;">🛒</span>
                    <span id="cartCount" class="cart-count" style="position: absolute; top: -8px; right: -8px; background: #f97316; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold;">0</span>
                </a>
            </div>
        </div>
    </header>

    <div class="properties-hero">
        <div class="container">
            <button onclick="window.history.back()" style="background: rgba(255,255,255,0.2); border: 2px solid white; color: white; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-bottom: 1.5rem; display: inline-flex; align-items: center; gap: 0.5rem;">
                ← Back
            </button>
            <h1>Professional Photography Services</h1>
            <p style="font-size: 1.125rem; opacity: 0.9;">Capture your Kenya memories with expert photographers</p>
        </div>
    </div>

    <div class="container section">
        <div class="grid" id="photographersGrid">
            <!-- Photographers will be loaded here -->
        </div>
    </div>

    <!-- Booking Modal -->
    <div id="bookingModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto;">
        <div style="position: relative; max-width: 600px; margin: 3rem auto; padding: 2rem;">
            <div style="background: white; border-radius: 16px; padding: 2rem;">
                <button onclick="closeBookingModal()" style="position: absolute; top: 2.5rem; right: 2.5rem; background: #f3f4f6; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; z-index: 10;">×</button>
                
                <h2 style="font-size: 1.75rem; margin-bottom: 1rem;" id="modalPhotographerName"></h2>
                <p style="color: #666; margin-bottom: 1.5rem;" id="modalPhotographerSpecialty"></p>
                
                <div style="background: #fef3c7; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem;">
                    <p style="font-weight: 600; margin-bottom: 0.5rem;">Package Details:</p>
                    <p style="font-size: 0.875rem;" id="modalPackageDetails"></p>
                </div>
                
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Select Date</label>
                    <input type="date" id="photoDate" class="input" style="width: 100%;" required>
                </div>
                
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Select Time</label>
                    <select id="photoTime" class="input" style="width: 100%;">
                        <option value="morning">Morning (6:00 AM - 10:00 AM)</option>
                        <option value="midday">Midday (10:00 AM - 2:00 PM)</option>
                        <option value="afternoon">Afternoon (2:00 PM - 6:00 PM)</option>
                        <option value="sunset">Sunset (6:00 PM - 8:00 PM)</option>
                    </select>
                </div>
                
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Location/Venue</label>
                    <input type="text" id="photoLocation" class="input" style="width: 100%;" placeholder="e.g., Malindi Beach, Hotel Name, etc." required>
                </div>
                
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Number of Hours</label>
                    <select id="photoHours" class="input" style="width: 100%;" onchange="updatePrice()">
                        <option value="2">2 Hours</option>
                        <option value="4">4 Hours</option>
                        <option value="6">6 Hours</option>
                        <option value="8">Full Day (8 Hours)</option>
                    </select>
                </div>
                
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Special Requests (Optional)</label>
                    <textarea id="photoRequests" class="input" style="width: 100%; min-height: 80px;" placeholder="Any specific shots or requirements?"></textarea>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: #f3f4f6; border-radius: 8px; margin-bottom: 1.5rem;">
                    <span style="font-weight: 600;">Total Price:</span>
                    <span style="font-size: 1.5rem; color: #f97316; font-weight: bold;" id="modalTotalPrice"></span>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <button onclick="addToCart()" class="btn-primary" style="background: #f97316;">
                        🛒 Add to Cart
                    </button>
                    <button onclick="payNow()" class="btn-primary" style="background: #10b981;">
                        💳 Pay Now
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 LuxuryStay. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/photography.js"></script>
</body>
</html>

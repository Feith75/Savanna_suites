<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Messages - LuxuryStay</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="nav">
                <a href="index.html" class="logo">LuxuryStay Admin</a>
                <nav class="nav-links">
                    <a href="host-dashboard.html">Dashboard</a>
                    <a href="admin-messages.html" class="highlight">Messages</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="container section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 style="font-size: 2rem;">Customer Messages</h1>
            <button onclick="refreshMessages()" class="btn-primary">
                🔄 Refresh
            </button>
        </div>

        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem;">
            <div style="background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                <h3 style="color: #666; font-size: 0.875rem; margin-bottom: 0.5rem;">Total Messages</h3>
                <p id="totalMessages" style="font-size: 2rem; font-weight: bold; color: #f97316;">0</p>
            </div>
            <div style="background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                <h3 style="color: #666; font-size: 0.875rem; margin-bottom: 0.5rem;">New Messages</h3>
                <p id="newMessages" style="font-size: 2rem; font-weight: bold; color: #10b981;">0</p>
            </div>
            <div style="background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                <h3 style="color: #666; font-size: 0.875rem; margin-bottom: 0.5rem;">Replied</h3>
                <p id="repliedMessages" style="font-size: 2rem; font-weight: bold; color: #3b82f6;">0</p>
            </div>
        </div>

        <div style="background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden;">
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead style="background: #f3f4f6;">
                        <tr>
                            <th style="padding: 1rem; text-align: left; font-weight: 600;">Status</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 600;">Name</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 600;">Email</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 600;">Subject</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 600;">Date</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 600;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="messagesTable">
                        <tr>
                            <td colspan="6" style="padding: 2rem; text-align: center; color: #666;">
                                Loading messages...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Message Detail Modal -->
    <div id="messageModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto;">
        <div style="max-width: 800px; margin: 2rem auto; background: white; border-radius: 12px; padding: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="font-size: 1.5rem;">Message Details</h2>
                <button onclick="closeModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">×</button>
            </div>
            <div id="messageContent"></div>
        </div>
    </div>

    <script>
        let messages = []

        async function fetchMessages() {
            try {
                const response = await fetch('http://localhost:3000/api/messages')
                const data = await response.json()
                
                if (data.success) {
                    messages = data.data
                    displayMessages()
                    updateStats()
                }
            } catch (error) {
                console.error('Error fetching messages:', error)
                document.getElementById('messagesTable').innerHTML = `
                    <tr>
                        <td colspan="6" style="padding: 2rem; text-align: center; color: #ef4444;">
                            Failed to load messages. Make sure the server is running.
                        </td>
                    </tr>
                `
            }
        }

        function displayMessages() {
            const tbody = document.getElementById('messagesTable')
            
            if (messages.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" style="padding: 2rem; text-align: center; color: #666;">
                            No messages yet
                        </td>
                    </tr>
                `
                return
            }

            tbody.innerHTML = messages.map(msg => `
                <tr style="border-bottom: 1px solid #e5e7eb;">
                    <td style="padding: 1rem;">
                        <span style="padding: 0.25rem 0.75rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; 
                            background: ${msg.status === 'new' ? '#dcfce7' : msg.status === 'read' ? '#dbeafe' : '#fef3c7'};
                            color: ${msg.status === 'new' ? '#166534' : msg.status === 'read' ? '#1e40af' : '#92400e'};">
                            ${msg.status.toUpperCase()}
                        </span>
                    </td>
                    <td style="padding: 1rem;">${msg.name}</td>
                    <td style="padding: 1rem;">${msg.email}</td>
                    <td style="padding: 1rem;">${msg.subject}</td>
                    <td style="padding: 1rem;">${new Date(msg.createdAt).toLocaleDateString()}</td>
                    <td style="padding: 1rem;">
                        <button onclick="viewMessage('${msg._id}')" class="btn-text" style="margin-right: 0.5rem;">View</button>
                        <button onclick="deleteMessage('${msg._id}')" class="btn-text" style="color: #ef4444;">Delete</button>
                    </td>
                </tr>
            `).join('')
        }

        function updateStats() {
            document.getElementById('totalMessages').textContent = messages.length
            document.getElementById('newMessages').textContent = messages.filter(m => m.status === 'new').length
            document.getElementById('repliedMessages').textContent = messages.filter(m => m.status === 'replied').length
        }

        async function viewMessage(id) {
            const message = messages.find(m => m._id === id)
            if (!message) return

            document.getElementById('messageContent').innerHTML = `
                <div style="margin-bottom: 1.5rem;">
                    <label style="font-weight: 600; display: block; margin-bottom: 0.5rem;">From:</label>
                    <p>${message.name} (${message.email})</p>
                    ${message.phone ? `<p>Phone: ${message.phone}</p>` : ''}
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="font-weight: 600; display: block; margin-bottom: 0.5rem;">Subject:</label>
                    <p>${message.subject}</p>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="font-weight: 600; display: block; margin-bottom: 0.5rem;">Message:</label>
                    <p style="white-space: pre-wrap;">${message.message}</p>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="font-weight: 600; display: block; margin-bottom: 0.5rem;">Received:</label>
                    <p>${new Date(message.createdAt).toLocaleString()}</p>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button onclick="updateStatus('${message._id}', 'read')" class="btn-primary">Mark as Read</button>
                    <button onclick="updateStatus('${message._id}', 'replied')" class="btn-primary">Mark as Replied</button>
                    <a href="mailto:${message.email}?subject=Re: ${message.subject}" class="btn-primary" style="text-decoration: none;">Reply via Email</a>
                </div>
            `
            
            document.getElementById('messageModal').style.display = 'block'

            // Mark as read automatically
            if (message.status === 'new') {
                await updateStatus(id, 'read', false)
            }
        }

        function closeModal() {
            document.getElementById('messageModal').style.display = 'none'
        }

        async function updateStatus(id, status, refresh = true) {
            try {
                const response = await fetch(`http://localhost:3000/api/messages/${id}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status })
                })

                const data = await response.json()
                
                if (data.success && refresh) {
                    alert('Status updated successfully')
                    fetchMessages()
                    closeModal()
                }
            } catch (error) {
                console.error('Error updating status:', error)
                alert('Failed to update status')
            }
        }

        async function deleteMessage(id) {
            if (!confirm('Are you sure you want to delete this message?')) return

            try {
                const response = await fetch(`http://localhost:3000/api/messages/${id}`, {
                    method: 'DELETE'
                })

                const data = await response.json()
                
                if (data.success) {
                    alert('Message deleted successfully')
                    fetchMessages()
                }
            } catch (error) {
                console.error('Error deleting message:', error)
                alert('Failed to delete message')
            }
        }

        function refreshMessages() {
            fetchMessages()
        }

        // Load messages on page load
        fetchMessages()
    </script>
</body>
</html>
